name: Deploy to Railway

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: TypeScript check
        run: npx tsc --noEmit --project . || echo "TypeScript errors found (some may be ignored in build)"
        
      - name: Build project
        run: NODE_OPTIONS=--max-old-space-size=4096 npm run build || (echo "Build failed with standard memory, trying low-memory mode" && NODE_OPTIONS=--max-old-space-size=2048 npm run build)
        
      - name: Run tests (if any)
        run: npm test --if-present

  deploy:
    needs: test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      
      - name: Verify Railway token
        run: |
          if [ -n "$RAILWAY_TOKEN" ]; then
            echo "✓ Railway token is set (length: ${#RAILWAY_TOKEN})"
            echo "Token preview: ${RAILWAY_TOKEN:0:8}..."
          else
            echo "✗ Railway token is empty"
            exit 1
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAYTOKEN }}
      
      - name: Deploy to Railway
        run: |
          railway link --project a29ae165-9d20-4621-9207-483e2c12c4cb
          railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAYTOKEN }}